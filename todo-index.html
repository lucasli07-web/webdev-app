<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📝 Todo List</h1>
            <p class="subtitle">Stay organized and track your daily tasks</p>
        </div>

        <!-- Statistics -->
        <div class="stats">
            <div class="stat-card">
                <span class="stat-label">Total</span>
                <span class="stat-number" id="totalCount">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Active</span>
                <span class="stat-number active" id="activeCount">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Completed</span>
                <span class="stat-number completed" id="completedCount">0</span>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <input
                type="text"
                id="todoInput"
                class="todo-input"
                placeholder="Add a new task..."
                autocomplete="off"
            >
            <button id="addBtn" class="add-btn">Add Task</button>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <!-- Todo List -->
        <div class="todo-container">
            <ul class="todo-list" id="todoList"></ul>
            <div class="empty-state" id="emptyState">
                <p>🎉 No tasks yet!</p>
                <p class="empty-subtitle">Add one to get started</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button id="clearCompletedBtn" class="btn-secondary">Clear Completed</button>
            <button id="deleteAllBtn" class="btn-danger">Delete All</button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>💾 Your tasks are automatically saved to your browser</p>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
